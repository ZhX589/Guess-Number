name: Release Build

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary and deb package
        run: |
          cargo build --release --verbose
          cargo deb

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          # 创建 tar.gz
          cp target/release/guessing_game artifacts/guessing_game-${{ steps.get_version.outputs.VERSION }}
          cd artifacts
          tar -czf guessing_game-${{ steps.get_version.outputs.VERSION }}.tar.gz guessing_game-${{ steps.get_version.outputs.VERSION }}
          # 复制 deb 包
          cp ../target/debian/*.deb guessing_game-${{ steps.get_version.outputs.VERSION }}.deb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/guessing_game-${{ steps.get_version.outputs.VERSION }}.tar.gz
            artifacts/guessing_game-${{ steps.get_version.outputs.VERSION }}.deb
          generate_release_notes: true
