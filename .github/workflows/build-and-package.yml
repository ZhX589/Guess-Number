name: Release Build

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Prepare binary and tar.gz
        run: |
          mkdir -p artifacts
          # 复制二进制文件
          cp target/release/guessing_game artifacts/guessing_game-${{ steps.get_version.outputs.VERSION }}
          # 创建 tar.gz 包
          cd artifacts
          tar -czf guessing_game-${{ steps.get_version.outputs.VERSION }}.tar.gz guessing_game-${{ steps.get_version.outputs.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/guessing_game-${{ steps.get_version.outputs.VERSION }}.tar.gz
          generate_release_notes: true

  build-deb:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deb-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deb-

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: cargo deb

      - name: Rename deb package
        run: |
          # cargo-deb 默认生成的文件名格式：package名_version_架构.deb
          mv target/debian/*.deb artifacts/guessing_game-${{ steps.get_version.outputs.VERSION }}.deb

      - name: Upload deb to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/guessing_game-${{ steps.get_version.outputs.VERSION }}.deb
          generate_release_notes: true
